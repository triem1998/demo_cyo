method: equivariant_patch

general:
  input_dir: /lustre/fswork/projects/rech/fio/commun/cryolithe/empiar-11830
  output_root: ./runs
  run_name: demo-cryo-ei-patch
  execution_mode: submitit   # change to 'local' to run locally
  max_train_vols: 4         # null = all non-val volumes
  max_val_vols: 4
  seed: 0

training:
  num_epochs: 1000
  learning_rate: 1.0e-4
  grad_clip: 1.0
  ckp_interval: 5000
  eval_interval: 500
  grad_accumulation_steps: 1
  log_every_n_epochs: 100   # print loss summary every N epochs
  infer_stride: 36         # icecream default stride for sliding-window inference
  infer_batch_size: 0      # 0 = same as training batch_size
  infer_downsample: 1      # spatial downsample factor before inference (1 = no downsampling)
  infer_train: true        # run inference on training volumes
  infer_val: true          # run inference on validation volumes
  save_mrc: false          # save reconstruction as .mrc file
  use_mixed_precision: true  # true = fp16 forward + scaled backward (~2x faster, matches icecream default)
  model_type: unet         # "unet" | "drunet"
  # unet params
  unet_dropout: 0.1
  # drunet params
  drunet_sigma: 0.0

patch:
  crop_size: 72             # cubic patch side length (icecream default)
  n_crops_per_vol: 8        # virtual crops per volume per epoch
  batch_size: 4
  num_workers: 1
  pin_memory: true
  prefetch_factor: 1
  persistent_workers: true
  normalize: true            # whole-volume zero-mean, unit-std (matches icecream's load_volume normalization)

equivariant:
  tilt_max: 60.0
  tilt_min: -60.0
  use_spherical_support: true
  wedge_double_size: true
  eq_weight: 2.0
  loss_type: icecream   # "icecream" | "custom"


  wedge_low_support: 0.0
  ref_wedge_support: 1.0
  pixel_size_angstrom: 7.84

slurm:
  job_name: demo-cryo-ei-patch
  nodes: 1
  gpus_per_node: 2
  ntasks_per_node: 2   # one task per GPU 
  cpus_per_task: 24    
  time: "02:00:00"
  account: # your account here
  constraint: "h100"
  qos: "qos_gpu_h100-dev"
  stderr_to_stdout: true
  setup:
    - "module purge"
    - "module load arch/h100"
    - "module load pytorch-gpu/py3/2.7.0"
    - "export NCCL_DEBUG=INFO"
